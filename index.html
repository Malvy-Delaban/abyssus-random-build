<style type="text/css">

        display: flex;
        flex-direction: column;
        justify-content: center;
        margin-top: 5rem;
    }

    .titles-container {
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .titles {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    }

        height: 5.73rem;
        width: 19rem;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.4rem;
    }

    .button-container:hover {
        cursor: pointer;
        filter: brightness(1.2);
        filter: drop-shadow(0 0 1rem #f5f0a810);
        font-size: 1.45rem;
        transition: 0.15s;
        color: white;
    }

    .build-container {
        display: flex;
        flex-direction: column;
        justify-content: end;
        align-items: center;
        gap: 2rem;
        width: 100%;
        margin-top: 5rem;
    }

    /* Desktop */
    @media (min-width: 1000px) {
        .build-container {
            flex-direction: row;
            justify-content: center;
            align-items: end;
        }
    }

    .build-element-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-bottom: -3rem;
    }

    .main-pic-img {
        width: 10rem;
        height: 10rem;
    }

    .blessing-pic-img {
        margin-top: -2rem;
        width: 6rem;
        height: 6rem;
    }

    .blessing-main-img {
        position: absolute;
        bottom: -3.2rem;
        width: 6rem;
        height: 6rem;
    }

    .build-element-name {
        font-size: 1.3rem;
        width: 12rem;
        text-wrap: wrap;
        text-align: center;
    }

    .build-weapon {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    .build-ability {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    .main-name {
        font-size: 2rem;
    }

    .main-img {
        width: 15rem;
        height: 15rem;
    }
</style>

<body>
    <div class="titles-container-parent">

            <div class="button-container" onclick="GetRandomBuild();">

    </div>

    <div class="build-container">
        <div class="build-weapon">

        </div>
        <div class="build-element-container">
            <p id="primary-name" class="build-element-name"></p>
            <img id="primary-pic" class="main-pic-img">
            <img id="primary-blessing" class="blessing-pic-img">

        <div class="build-element-container">

        <div class="build-ability">

            <img id="ability-pic" class="main-img">
            <img id="ability-blessing" class="blessing-main-img">

    </div>
</body>

    function getRandomInt(max) {
        return Math.floor(Math.random() * max);
    }

    function GetRandomWeapon() {
        currentWeapon = weaponList[getRandomInt(weaponList.length)];
        currentWeaponPrimary = currentWeapon.primaryMods[getRandomInt(currentWeapon.primaryMods.length)];
        currentWeaponSecondary = currentWeapon.secondaryMods[getRandomInt(currentWeapon.secondaryMods.length)];

        document.getElementById("primary-pic").src = "assets/weapons/" + currentWeaponPrimary.pic + ".png";

        document.getElementById("weapon-pic").src = "assets/weapons/" + currentWeapon.pic + ".png";

        document.getElementById("secondary-name").innerHTML = currentWeaponSecondary.name;

    function GetRandomAbility() {
        currentAbility = abilityList[getRandomInt(abilityList.length)];
        document.getElementById("ability-pic").src = "assets/abilities/" + currentAbility.pic + ".png";
        document.getElementById("ability-name").innerHTML = currentAbility.name;

    }

    function GetRandomBlessing() {
        let picToSet = null;
        let usedBlessings = [];
        let currentBlessing = null;
        for (let currentBlessingId = 0; currentBlessingId < 3; currentBlessingId++) {
            switch (currentBlessingId) {
                case 0:
                    picToSet = document.getElementById("primary-blessing");
                    break;
                case 1:
                    picToSet = document.getElementById("secondary-blessing");
                    break;
                case 2:
                    picToSet = document.getElementById("ability-blessing");
                    break;
            }
            currentBlessing = blessingList[getRandomInt(blessingList.length)];
            while (usedBlessings.includes(currentBlessing)) {
                currentBlessing = blessingList[getRandomInt(blessingList.length)];
            }
            usedBlessings.push(currentBlessing);
            picToSet.src = "assets/blessings/" + currentBlessing + "_Icon.png";
        }
    }

    function GetRandomBuild() {
        GetRandomWeapon();
        GetRandomAbility();
        GetRandomBlessing();
